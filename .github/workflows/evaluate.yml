name: Automated RAGAS Evaluation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  evaluate-rag:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # Speeds up installations

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Ragas Spectrometer Evaluation
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        # Run the evaluation script
        python src/eval/evaluate_rag.py
        
        # Display the output CSV in the GitHub Actions terminal logs
        cat final_evaluation_report.csv

    - name: Save Evaluation Artifacts
        uses: actions/upload-artifact@v4
        if: always() # This ensures it uploads even if the test fails!
        with:
          name: rag-evaluation-results
          path: |
            final_evaluation_report.csv
            mlflow.db


    - name: Send Evaluation Report via Email
        uses: dawidd6/action-send-mail@v3
        if: success()
        with:
          # SMTP Server Configuration (Gmail Example)
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          # Credentials hidden in GitHub Secrets
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          # Email Metadata
          subject:
            🟢 SUCCESS: Agentic RAG Evaluation Report
          to: recipient1@example.com, recipient2@example.com
          from: QA Automation Pipeline

          # The Email Body
          body: |
            The Agentic RAG evaluation pipeline has completed successfully!

            The Llama 70B judge has graded the latest commit.
            Please find the detailed RAGAS metrics (Faithfulness, Answer Correctness, etc.) in the attached CSV report.

            View the full run on GitHub Actions here: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          # Attach your CSV artifact directly to the email!
          attachments: final_evaluation_report.csv